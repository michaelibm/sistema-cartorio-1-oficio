version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: cartorio-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cartorio_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - cartorio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cartorio_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cartorio-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-5000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-cartorio_db}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      SMTP_HOST: ${SMTP_HOST:-smtps.uol.com.br}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-registros@1rimanaus.com.br}
      SMTP_PASS: ${SMTP_PASS}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cartorio-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ⬅️ Passa o IP real do servidor no momento do build
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://192.168.0.95:5000/api}
    container_name: cartorio-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - backend
    networks:
      - cartorio-network

networks:
  cartorio-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
